name: "Build TypeScript SDK"
description: "Build all API versions of the TypeScript SDK from OpenAPI specs"

inputs:
  api-specs-path:
    description: "Path to the checked-out api-specs repository"
    required: false
    default: "api-specs"
  skip-tests:
    description: "Skip running tests after building"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: "20"

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"
        
    - name: Install Node dependencies
      shell: bash
      run: npm install

    - name: Download OpenAPI Generator
      shell: bash
      run: |
        wget -q https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.12.0/openapi-generator-cli-7.12.0.jar -O openapi-generator-cli.jar

    - name: Build Versioned SDK (per-partition)
      shell: bash
      run: |
        node sdk-resources/build-versioned-sdk.js \
          ${{ inputs.api-specs-path }}/idn/apis \
          --concurrency 16

    - name: Build NERM SDK
      shell: bash
      run: |
        rm -rf ./sdk-output/nerm
        java -jar openapi-generator-cli.jar generate \
          -i ${{ inputs.api-specs-path }}/nerm/openapi.yaml \
          -g typescript-axios -o sdk-output/nerm \
          --global-property skipFormModel=false --config sdk-resources/nerm-config.yaml --api-name-suffix NERMApi --model-name-suffix NERM 

    - name: Build NERM V2025 SDK
      shell: bash
      run: |
        rm -rf ./sdk-output/nermv2025
        java -jar openapi-generator-cli.jar generate \
          -i ${{ inputs.api-specs-path }}/nerm/v2025/v2025.yaml \
          -g typescript-axios -o sdk-output/nermv2025 \
          --global-property skipFormModel=false --config sdk-resources/nerm-v2025-config.yaml --api-name-suffix NERMV2025Api --model-name-suffix NERMV2025 

    - name: Build and Test
      shell: bash
      run: |
        cd sdk-output
        npm install
        npm run build
        if [ "${{ inputs.skip-tests }}" != "true" ]; then
          npm run test
        fi
