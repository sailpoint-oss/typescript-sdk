- path: /segments/v1/{id}
  method: PATCH
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/segments/methods/segments#patch-segment-v1
      source: |
        import { SegmentsApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new SegmentsApi(configuration);
        const id: string = 'ef38f94347e94562b5bb8424a56397d8'; // string | The segment ID to modify. (default to undefined)
        const requestBody: Array<object> = [{"op":"replace","path":"/visibilityCriteria","value":{"expression":{"operator":"AND","children":[{"operator":"EQUALS","attribute":"location","value":{"type":"STRING","value":"Philadelphia"}},{"operator":"EQUALS","attribute":"department","value":{"type":"STRING","value":"HR"}}]}}}]; // Array<object> | A list of segment update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard.  The following fields are patchable: * name * description * owner * visibilityCriteria * active 
        const result = await apiInstance.patchSegmentV1({ id: id, requestBody: requestBody });
        console.log(result);
