- path: /transforms/v1
  method: POST
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/transforms/methods/transforms#create-transform-v1
      source: |
        import { TransformsApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { Transform } from 'sailpoint-api-client/dist/transforms/api';

        const configuration = new Configuration();
        const apiInstance = new TransformsApi(configuration);
        const transform: Transform = {
  "name" : "Timestamp To Date",
  "attributes" : "{}",
  "type" : "dateFormat"
}; // Transform | The transform to be created.
        const result = await apiInstance.createTransformV1({ transform: transform });
        console.log(result);
