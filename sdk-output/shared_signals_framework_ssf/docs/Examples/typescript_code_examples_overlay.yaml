  "events_requested" : [ "https://schemas.openid.net/secevent/caep/event-type/session-revoked" ]
}; // CreateStreamRequest | 
        const result = await apiInstance.createStreamV1({ createStreamRequest: createStreamRequest });
        console.log(result);
