- path: /mfa/v1/{method}/test
  method: GET
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/mfa_configuration/methods/mfa-configuration#test-mfa-config-v1
      source: |
        import { MFAConfigurationApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new MFAConfigurationApi(configuration);
        const method: string = 'okta-verify'; // 'okta-verify' | 'duo-web' | The name of the MFA method. The currently supported method names are \'okta-verify\' and \'duo-web\'. (default to undefined)
        const result = await apiInstance.testMFAConfigV1({ method: method });
        console.log(result);
