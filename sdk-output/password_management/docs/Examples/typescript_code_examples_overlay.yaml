- path: /generate-password-reset-token/v1/digit
  method: POST
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/password_management/methods/password-management#create-digit-token-v1
      source: |
        import { PasswordManagementApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { PasswordDigitTokenReset } from 'sailpoint-api-client/dist/password_management/api';

        const configuration = new Configuration();
        const apiInstance = new PasswordManagementApi(configuration);
        const passwordDigitTokenReset: PasswordDigitTokenReset = {
  "durationMinutes" : 5,
  "length" : 8,
  "userId" : "Abby.Smith"
}; // PasswordDigitTokenReset | 
        const xSailPointExperimental: string = 'true'; // string | Use this header to enable this experimental API. (optional) (default to 'true')
        const result = await apiInstance.createDigitTokenV1({ passwordDigitTokenReset: passwordDigitTokenReset });
        console.log(result);
