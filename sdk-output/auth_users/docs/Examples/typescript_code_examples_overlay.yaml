        console.log(result);
- path: /auth-users/v1/{id}
  method: PATCH
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/auth_users/methods/auth-users#patch-auth-user-v1
      source: |
        import { AuthUsersApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new AuthUsersApi(configuration);
        const id: string = 'ef38f94347e94562b5bb8424a56397d8'; // string | Identity ID (default to undefined)
        const jsonpatchoperation: Array&lt;Jsonpatchoperation&gt; = [{"op":"replace","path":"/capabilities","value":["ORG_ADMIN"]}]; // Array<Jsonpatchoperation> | A list of auth user update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard.
        const result = await apiInstance.patchAuthUserV1({ id: id, jsonpatchoperation: jsonpatchoperation });
        console.log(result);
