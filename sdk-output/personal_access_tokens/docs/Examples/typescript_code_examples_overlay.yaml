- path: /personal-access-tokens/v1
  method: POST
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/personal_access_tokens/methods/personal-access-tokens#create-personal-access-token-v1
      source: |
        import { PersonalAccessTokensApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { CreatePersonalAccessTokenRequest } from 'sailpoint-api-client/dist/personal_access_tokens/api';

        const configuration = new Configuration();
        const apiInstance = new PersonalAccessTokensApi(configuration);
        const createPersonalAccessTokenRequest: CreatePersonalAccessTokenRequest = {
  "scope" : [ "demo:personal-access-token-scope:first", "demo:personal-access-token-scope:second" ],
  "accessTokenValiditySeconds" : 36900,
  "name" : "NodeJS Integration",
  "userAwareTokenNeverExpires" : false,
  "expirationDate" : "2026-12-31T23:59:59.999Z"
}; // CreatePersonalAccessTokenRequest | Configuration for creating a personal access token, including name, scope, expiration settings, and user acknowledgment of never-expiring tokens. **Important:** See the endpoint description for validation rules regarding the relationship between `expirationDate` and `userAwareTokenNeverExpires`.
        const result = await apiInstance.createPersonalAccessTokenV1({ createPersonalAccessTokenRequest: createPersonalAccessTokenRequest });
        console.log(result);
