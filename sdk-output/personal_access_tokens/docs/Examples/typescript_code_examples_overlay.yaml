- path: /personal-access-tokens/v1/{id}
  method: PATCH
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/personal_access_tokens/methods/personal-access-tokens#patch-personal-access-token-v1
      source: |
        import { PersonalAccessTokensApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { JsonPatchOperation } from 'sailpoint-api-client/dist/personal_access_tokens/api';

        const configuration = new Configuration();
        const apiInstance = new PersonalAccessTokensApi(configuration);
        const id: string = 'ef38f94347e94562b5bb8424a56397d8'; // string | The Personal Access Token id (default to undefined)
        const jsonPatchOperation: Array<JsonPatchOperation> = {
  "op" : "replace",
  "path" : "/description",
  "value" : "New description"
}; // Array<JsonPatchOperation> | A list of OAuth client update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard.  The following fields are patchable: * name * scope * expirationDate * userAwareTokenNeverExpires  **Important:** See the endpoint description for validation rules regarding the relationship between `expirationDate` and `userAwareTokenNeverExpires`. 
        const result = await apiInstance.patchPersonalAccessTokenV1({ id: id, jsonPatchOperation: jsonPatchOperation });
        console.log(result);
