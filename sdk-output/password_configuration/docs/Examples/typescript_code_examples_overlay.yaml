- path: /password-org-config/v1
  method: POST
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/password_configuration/methods/password-configuration#create-password-org-config-v1
      source: |
        import { PasswordConfigurationApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { Passwordorgconfig } from 'sailpoint-api-client/dist/password_configuration/api';

        const configuration = new Configuration();
        const apiInstance = new PasswordConfigurationApi(configuration);
        const passwordorgconfig: Passwordorgconfig = {"customInstructionsEnabled":true,"digitTokenEnabled":true,"digitTokenDurationMinutes":12,"digitTokenLength":9}; // Passwordorgconfig | 
        const result = await apiInstance.createPasswordOrgConfigV1({ passwordorgconfig: passwordorgconfig });
        console.log(result);
