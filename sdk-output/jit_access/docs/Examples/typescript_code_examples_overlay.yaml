- path: /jit-activation-config/v1/{configType}
  method: GET
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/jit_access/methods/jit-access#get-jit-activation-config-v1
      source: |
        import { JITAccessApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new JITAccessApi(configuration);
        const configType: string = 'policy'; // 'policy' | Configuration kind to read. Only **policy** (JIT activation policy) is supported today.  (default to undefined)
        const result = await apiInstance.getJitActivationConfigV1({ configType: configType });
        console.log(result);
- path: /jit-activation-config/v1/{configType}
  method: PATCH
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/jit_access/methods/jit-access#patch-jit-activation-config-v1
      source: |
        import { JITAccessApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { JitAccessOperationRequest } from 'sailpoint-api-client/dist/jit_access/api';

        const configuration = new Configuration();
        const apiInstance = new JITAccessApi(configuration);
        const configType: string = 'policy'; // 'policy' | Configuration kind to update. Only **policy** (JIT activation policy) is supported today.  (default to undefined)
        const jitAccessOperationRequest: Array<JitAccessOperationRequest> = {
  "op" : "replace",
  "path" : "/maxActivationPeriodMins",
  "value" : 60
}; // Array<JitAccessOperationRequest> | 
        const result = await apiInstance.patchJitActivationConfigV1({ configType: configType, jitAccessOperationRequest: jitAccessOperationRequest });
        console.log(result);
