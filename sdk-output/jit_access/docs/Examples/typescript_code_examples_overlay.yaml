- path: /jit-activation-config/v1/{configType}
  method: GET
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/jit_access/methods/jit-access#get-jit-activation-config-v1
      source: |
        import { JITAccessV1Api } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { createConfiguration } from 'sailpoint-api-client';

        const configuration = createConfiguration();
        const apiInstance = new JITAccessV1Api(configuration);
        const configType: string = 'policy'; // 'policy' | Configuration kind to read. Only **policy** (JIT activation policy) is supported today.  (default to undefined)
        const result = await apiInstance.getJitActivationConfigV1(configType);
        console.log(result);
