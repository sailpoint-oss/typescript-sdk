- path: /certifications/v1/{id}/access-summaries/{type}
  method: GET
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/certification_summaries/methods/certification-summaries#get-identity-access-summaries-v1
      source: |
        import { CertificationSummariesApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new CertificationSummariesApi(configuration);
        const id: string = 'ef38f94347e94562b5bb8424a56397d8'; // string | The identity campaign certification ID (default to undefined)
        const type: string = 'ACCESS_PROFILE'; // 'ROLE' | 'ACCESS_PROFILE' | 'ENTITLEMENT' | The type of access review item to retrieve summaries for (default to undefined)
        const limit: number = 250; // number | Max number of results to return. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 250)
        const offset: number = 0; // number | Offset into the full result set. Usually specified with *limit* to paginate through the results. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 0)
        const count: boolean = true; // boolean | If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.  Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.  See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to false)
        const filters: string = 'access.id eq "ef38f94347e94562b5bb8424a56397d8"'; // string | Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)  Filtering is supported for the following fields and operators:  **completed**: *eq, ne*  **access.id**: *eq, in*  **access.name**: *eq, sw*  **entitlement.sourceName**: *eq, sw*  **accessProfile.sourceName**: *eq, sw* (optional) (default to undefined)
        const sorters: string = 'access.name'; // string | Sort results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)  Sorting is supported for the following fields: **access.name** (optional) (default to undefined)
        const result = await apiInstance.getIdentityAccessSummariesV1({ id: id, type: type });
        console.log(result);
