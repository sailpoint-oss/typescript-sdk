- path: /search/v1/{index}/{id}
  method: GET
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/search/methods/search#search-get-v1
      source: |
        import { SearchApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new SearchApi(configuration);
        const index: string = 'identities'; // 'accessprofiles' | 'accountactivities' | 'entitlements' | 'events' | 'identities' | 'roles' | The index from which to fetch the specified document.  The currently supported index names are: *accessprofiles*, *accountactivities*, *entitlements*, *events*, *identities*, and *roles*.  (default to undefined)
        const id: string = '2c91808568c529c60168cca6f90c1313'; // string | ID of the requested document. (default to undefined)
        const result = await apiInstance.searchGetV1({ index: index, id: id });
        console.log(result);
