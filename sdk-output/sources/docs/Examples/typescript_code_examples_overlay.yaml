        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new SourcesApi(configuration);
        const id: string = '2c9180835d191a86015d28455b4a2329'; // string | Source ID. (default to undefined)
        const jsonpatchoperation: Array&lt;Jsonpatchoperation&gt; = [{"op":"replace","path":"/description","value":"new description"}]; // Array<Jsonpatchoperation> | A list of account update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard. Any password changes are submitted as plain-text and encrypted upon receipt in Identity Security Cloud (ISC).
        const result = await apiInstance.updateSourceV1({ id: id, jsonpatchoperation: jsonpatchoperation });
        console.log(result);
