- path: /access-model-metadata/v1/attributes
  method: POST
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/access_model_metadata/methods/access-model-metadata#create-access-model-metadata-attribute-v1
      source: |
        import { AccessModelMetadataApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { AttributeDTO } from 'sailpoint-api-client/dist/access_model_metadata/api';

        const configuration = new Configuration();
        const apiInstance = new AccessModelMetadataApi(configuration);
        const attributeDTO: AttributeDTO = {
  "multiselect" : false,
  "values" : [ {
    "name" : "Public",
    "value" : "public",
    "status" : "active"
  }, {
    "name" : "Public",
    "value" : "public",
    "status" : "active"
  } ],
  "name" : "Privacy",
  "description" : "Specifies the level of privacy associated with an access item.",
  "type" : "governance",
  "objectTypes" : [ "entitlement" ],
  "key" : "iscPrivacy",
  "status" : "active"
}; // AttributeDTO | Attribute to create
        const result = await apiInstance.createAccessModelMetadataAttributeV1({ attributeDTO: attributeDTO });
        console.log(result);
