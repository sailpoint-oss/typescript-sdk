- path: /oauth-clients/v1/{id}
  method: PATCH
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/oauth_clients/methods/o-auth-clients#patch-oauth-client-v1
      source: |
        import { OAuthClientsApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { Jsonpatchoperation } from 'sailpoint-api-client/dist/oauth_clients/api';

        const configuration = new Configuration();
        const apiInstance = new OAuthClientsApi(configuration);
        const id: string = 'ef38f94347e94562b5bb8424a56397d8'; // string | The OAuth client id (default to undefined)
        const jsonpatchoperation: Array<Jsonpatchoperation> = [{"op":"replace","path":"/strongAuthSupported","value":true},{"op":"replace","path":"/businessName","value":"acme-solar"}]; // Array<Jsonpatchoperation> | A list of OAuth client update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard.  The following fields are patchable: * tenant * businessName * homepageUrl * name * description * accessTokenValiditySeconds * refreshTokenValiditySeconds * redirectUris * grantTypes * accessType * enabled * strongAuthSupported * claimsSupported 
        const result = await apiInstance.patchOauthClientV1({ id: id, jsonpatchoperation: jsonpatchoperation });
        console.log(result);
