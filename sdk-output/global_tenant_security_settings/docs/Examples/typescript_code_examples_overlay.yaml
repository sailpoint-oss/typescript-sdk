- path: /auth-org/v1/lockout-config
  method: PATCH
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/global_tenant_security_settings/methods/global-tenant-security-settings#patch-auth-org-lockout-config-v1
      source: |
        import { GlobalTenantSecuritySettingsApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { JsonPatchOperation } from 'sailpoint-api-client/dist/global_tenant_security_settings/api';

        const configuration = new Configuration();
        const apiInstance = new GlobalTenantSecuritySettingsApi(configuration);
        const jsonPatchOperation: Array<JsonPatchOperation> = {
  "op" : "replace",
  "path" : "/description",
  "value" : "New description"
}; // Array<JsonPatchOperation> | A list of auth org lockout configuration update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard. Ensures that the patched Lockout Config conforms to certain logical guidelines, which are:   `1. maximumAttempts >= 1 && maximumAttempts <= 15   2. lockoutDuration >= 5 && lockoutDuration <= 60   3. lockoutWindow >= 5 && lockoutDuration <= 60`
        const result = await apiInstance.patchAuthOrgLockoutConfigV1({ jsonPatchOperation: jsonPatchOperation });
        console.log(result);
