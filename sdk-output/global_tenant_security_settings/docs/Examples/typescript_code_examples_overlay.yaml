- path: /auth-org/v1/service-provider-config
  method: PATCH
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/global_tenant_security_settings/methods/global-tenant-security-settings#patch-auth-org-service-provider-config-v1
      source: |
        import { GlobalTenantSecuritySettingsApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { JsonPatchOperation } from 'sailpoint-api-client/dist/global_tenant_security_settings/api';

        const configuration = new Configuration();
        const apiInstance = new GlobalTenantSecuritySettingsApi(configuration);
        const jsonPatchOperation: Array<JsonPatchOperation> = {
  "op" : "replace",
  "path" : "/description",
  "value" : "New description"
}; // Array<JsonPatchOperation> | A list of auth org service provider configuration update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard. Note: /federationProtocolDetails/0 is IdpDetails /federationProtocolDetails/1 is SpDetails Ensures that the patched ServiceProviderConfig conforms to certain logical guidelines, which are:   1. Do not add or remove any elements in the federation protocol details in the service provider configuration.   2. Do not modify, add, or delete the service provider details element in the federation protocol details.   3. If this is the first time the patched ServiceProviderConfig enables Remote IDP sign-in, it must also include IDPDetails.   4. If the patch enables Remote IDP sign in, the entityID in the IDPDetails cannot be null. IDPDetails must include an entityID.   5. Any JIT configuration update must be valid.  Just in time configuration update must be valid when enabled. This includes:   - A Source ID   - Source attribute mappings   - Source attribute maps have all the required key values (firstName, lastName, email)
        const result = await apiInstance.patchAuthOrgServiceProviderConfigV1({ jsonPatchOperation: jsonPatchOperation });
        console.log(result);
