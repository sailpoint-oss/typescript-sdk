- path: /auth-org/v1/network-config
  method: POST
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/global_tenant_security_settings/methods/global-tenant-security-settings#create-auth-org-network-config-v1
      source: |
        import { GlobalTenantSecuritySettingsApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { NetworkConfiguration } from 'sailpoint-api-client/dist/global_tenant_security_settings/api';

        const configuration = new Configuration();
        const apiInstance = new GlobalTenantSecuritySettingsApi(configuration);
        const networkConfiguration: NetworkConfiguration = {
  "range" : [ "1.3.7.2", "255.255.255.252/30" ],
  "whitelisted" : true,
  "geolocation" : [ "CA", "FR", "HT" ]
}; // NetworkConfiguration | Network configuration creation request body.   The following constraints ensure the request body conforms to certain logical guidelines, which are:   1. Each string element in the range array must be a valid ip address or ip subnet mask.   2. Each string element in the geolocation array must be 2 characters, and they can only be uppercase letters.
        const result = await apiInstance.createAuthOrgNetworkConfigV1({ networkConfiguration: networkConfiguration });
        console.log(result);
