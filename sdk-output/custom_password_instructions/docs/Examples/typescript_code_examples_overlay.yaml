- path: /custom-password-instructions/v1
  method: POST
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/custom_password_instructions/methods/custom-password-instructions#create-custom-password-instructions-v1
      source: |
        import { CustomPasswordInstructionsApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { CustomPasswordInstruction } from 'sailpoint-api-client/dist/custom_password_instructions/api';

        const configuration = new Configuration();
        const apiInstance = new CustomPasswordInstructionsApi(configuration);
        const customPasswordInstruction: CustomPasswordInstruction = {
  "pageContent" : "Please enter a new password. Your password must be at least 8 characters long and contain at least one number and one letter.",
  "pageId" : "change-password:enter-password",
  "locale" : "en"
}; // CustomPasswordInstruction | 
        const xSailPointExperimental: string = 'true'; // string | Use this header to enable this experimental API. (optional) (default to 'true')
        const result = await apiInstance.createCustomPasswordInstructionsV1({ customPasswordInstruction: customPasswordInstruction });
        console.log(result);
- path: /custom-password-instructions/v1/{pageId}
  method: DELETE
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/custom_password_instructions/methods/custom-password-instructions#delete-custom-password-instructions-v1
      source: |
        import { CustomPasswordInstructionsApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new CustomPasswordInstructionsApi(configuration);
        const pageId: string = 'mfa:select'; // 'change-password:enter-password' | 'change-password:finish' | 'flow-selection:select' | 'forget-username:user-email' | 'mfa:enter-code' | 'mfa:enter-kba' | 'mfa:select' | 'reset-password:enter-password' | 'reset-password:enter-username' | 'reset-password:finish' | 'unlock-account:enter-username' | 'unlock-account:finish' | The page ID of custom password instructions to delete. (default to undefined)
        const locale: string = 'locale_example'; // string | The locale for the custom instructions, a BCP47 language tag. The default value is \\\"default\\\". (optional) (default to undefined)
        const xSailPointExperimental: string = 'true'; // string | Use this header to enable this experimental API. (optional) (default to 'true')
        const result = await apiInstance.deleteCustomPasswordInstructionsV1({ pageId: pageId });
        console.log(result);
