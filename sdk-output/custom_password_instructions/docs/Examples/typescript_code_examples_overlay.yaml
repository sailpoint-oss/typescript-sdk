- path: /custom-password-instructions/v1
  method: POST
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/custom_password_instructions/methods/custom-password-instructions#create-custom-password-instructions-v1
      source: |
        import { CustomPasswordInstructionsApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new CustomPasswordInstructionsApi(configuration);
        const custompasswordinstruction: Custompasswordinstruction = {"pageId":"reset-password:enter-password","pageContent":"See company password policies for details by clicking <a href=\"url\">here</a>"}; // Custompasswordinstruction | 
        const xSailPointExperimental: string = 'true'; // string | Use this header to enable this experimental API. (optional) (default to 'true')
        const result = await apiInstance.createCustomPasswordInstructionsV1({ custompasswordinstruction: custompasswordinstruction });
        console.log(result);
