- path: /criteria-config/v1/privilege/{criteriaConfigId}
  method: PATCH
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/privilege_criteria_configuration/methods/privilege-criteria-configuration#patch-privilege-criteria-config-v1
      source: |
        import { PrivilegeCriteriaConfigurationApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new PrivilegeCriteriaConfigurationApi(configuration);
        const criteriaConfigId: string = '6d123044-5834-4e8d-a49f-9c70089b0de1'; // string | The Id of the privilege criteria configuration to update. (default to undefined)
        const requestBody: Array<object> = [{"op":"replace","path":"/config/privilegeClassificationMode","value":"SINGLE_PRIVILEGE_LEVEL"},{"op":"replace","path":"/config/criteriaPrivilegeLevel/connectorMediumEnabled","value":true}]; // Array<object> | A list of criteria configuration operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard.
        const result = await apiInstance.patchPrivilegeCriteriaConfigV1({ criteriaConfigId: criteriaConfigId, requestBody: requestBody });
        console.log(result);
