- path: /access-request-approvals/v1/{approvalId}/approve
  method: POST
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/access_request_approvals/methods/access-request-approvals#approve-access-request-v1
      source: |
        import { AccessRequestApprovalsApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { CommentDto } from 'sailpoint-api-client/dist/access_request_approvals/api';

        const configuration = new Configuration();
        const apiInstance = new AccessRequestApprovalsApi(configuration);
        const approvalId: string = '2c91808b7294bea301729568c68c002e'; // string | Approval ID. (default to undefined)
        const commentDto: CommentDto = {
  "created" : "2017-07-11T18:45:37.098Z",
  "author" : {
    "name" : "john.doe",
    "id" : "2c9180847e25f377017e2ae8cae4650b",
    "type" : "IDENTITY"
  },
  "comment" : "This is a comment."
}; // CommentDto | Reviewer\'s comment. (optional)
        const result = await apiInstance.approveAccessRequestV1({ approvalId: approvalId });
        console.log(result);
