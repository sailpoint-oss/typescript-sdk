- path: /discovered-applications/v1
  method: GET
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/application_discovery/methods/application-discovery#get-discovered-applications-v1
      source: |
        import { ApplicationDiscoveryV1Api } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { createConfiguration } from 'sailpoint-api-client';

        const configuration = createConfiguration();
        const apiInstance = new ApplicationDiscoveryV1Api(configuration);
        const limit: number = 250; // number | Max number of results to return. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 250)
        const offset: number = 0; // number | Offset into the full result set. Usually specified with *limit* to paginate through the results. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 0)
        const detail: string = 'FULL'; // 'SLIM' | 'FULL' | Determines whether slim, or increased level of detail is provided for each discovered application in the returned list. SLIM is the default behavior. (optional) (default to undefined)
        const filter: string = 'name eq "Okta" and description co "Okta" and discoverySource in ("csv", "Okta Saas")'; // string | Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)  Filtering is supported for the following fields and operators:  **name**: *eq, sw, co*  **description**: *eq, sw, co*  **createdAtStart**: *eq, le, ge*  **createdAtEnd**: *eq, le, ge*  **discoveredAtStart**: *eq, le, ge*  **discoveredAtEnd**: *eq, le, ge*  **discoverySource**: *eq, in*  **discoverySourceName**: *eq, in*  **discoverySourceCategory**: *eq, in*  (optional) (default to undefined)
        const sorters: string = 'name'; // string | Sort results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)  Sorting is supported for the following fields: **name, description, discoveredAt, discoverySource, discoverySourceName, discoverySourceCategory** (optional) (default to undefined)
        const result = await apiInstance.getDiscoveredApplicationsV1();
        console.log(result);
