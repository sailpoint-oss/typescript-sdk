- path: /intelligence/v1/identities
  method: GET
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/intelligence/methods/intelligence#get-identity-intelligence-v1
      source: |
        import { IntelligenceApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new IntelligenceApi(configuration);
        const filters: string = 'id eq "ef38f94347e94562b5bb8424a56397d8"'; // string | Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)  Filtering is supported for the following fields and operators:  **id**: *eq*  **email**: *eq* (default to undefined)
        const result = await apiInstance.getIdentityIntelligenceV1({ filters: filters });
        console.log(result);
