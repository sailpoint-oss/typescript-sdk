- path: /criteria/v1/privilege
  method: GET
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/privilege_criteria/methods/privilege-criteria#list-privilege-criteria-v1
      source: |
        import { PrivilegeCriteriaApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';

        const configuration = new Configuration();
        const apiInstance = new PrivilegeCriteriaApi(configuration);
        const filters: string = 'type eq "CUSTOM" and sourceId eq "c42c45d8d7c04d2da64d215cd8c32f21"'; // string | Filter results using the standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)  Filtering is supported for the following fields and operators:  **type**: *eq*  **sourceId**: *eq*  **privilegeLevel**: *eq*  **Supported composite operators**: *and*  All filter values are case-sensitive for this API.  For example, the following is valid: `?filters=type eq \"CUSTOM\" and sourceId eq \"2c91809175e6c63f0175fb5570220569\"` (default to undefined)
        const result = await apiInstance.listPrivilegeCriteriaV1({ filters: filters });
        console.log(result);
- path: /criteria/v1/privilege/{criteriaId}
  method: PUT
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/privilege_criteria/methods/privilege-criteria#put-custom-privilege-criteria-value-v1
      source: |
        import { PrivilegeCriteriaApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { PrivilegeCriteriaDTO } from 'sailpoint-api-client/dist/privilege_criteria/api';

        const configuration = new Configuration();
        const apiInstance = new PrivilegeCriteriaApi(configuration);
        const criteriaId: string = '6d123044-5834-4e8d-a49f-9c70089b0de1'; // string | The Id of the privilege criteria record to return. (default to undefined)
        const privilegeCriteriaDTO: PrivilegeCriteriaDTO = {
  "sourceId" : "c42c45d8d7c04d2da64d215cd8c32f21",
  "privilegeLevel" : "HIGH",
  "groups" : [ {
    "criteriaItems" : [ {
      "ignoreCase" : true,
      "values" : [ "admin", "superuser" ],
      "property" : "displayName",
      "targetType" : "group",
      "operator" : "IN"
    }, {
      "ignoreCase" : true,
      "values" : [ "admin", "superuser" ],
      "property" : "displayName",
      "targetType" : "group",
      "operator" : "IN"
    } ],
    "operator" : "AND"
  }, {
    "criteriaItems" : [ {
      "ignoreCase" : true,
      "values" : [ "admin", "superuser" ],
      "property" : "displayName",
      "targetType" : "group",
      "operator" : "IN"
    }, {
      "ignoreCase" : true,
      "values" : [ "admin", "superuser" ],
      "property" : "displayName",
      "targetType" : "group",
      "operator" : "IN"
    } ],
    "operator" : "AND"
  } ],
  "id" : "2c9180867817ac4d017817c491119a20",
  "type" : "CUSTOM",
  "operator" : "AND"
}; // PrivilegeCriteriaDTO | The new version of the custom privilege criteria. This overwrites the existing privilege criteria.
        const result = await apiInstance.putCustomPrivilegeCriteriaValueV1({ criteriaId: criteriaId, privilegeCriteriaDTO: privilegeCriteriaDTO });
        console.log(result);
