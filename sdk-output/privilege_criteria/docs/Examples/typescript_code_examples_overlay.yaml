- path: /criteria/v1/privilege
  method: POST
  xCodeSample:
    - lang: TypeScript
      label: SDK_tools/sdk/typescript/privilege_criteria/methods/privilege-criteria#create-custom-privilege-criteria-v1
      source: |
        import { PrivilegeCriteriaApi } from 'sailpoint-api-client';
        import { Configuration } from 'sailpoint-api-client';
        import { CreatePrivilegeCriteriaRequest } from 'sailpoint-api-client/dist/privilege_criteria/api';

        const configuration = new Configuration();
        const apiInstance = new PrivilegeCriteriaApi(configuration);
        const createPrivilegeCriteriaRequest: CreatePrivilegeCriteriaRequest = {
  "sourceId" : "c42c45d8d7c04d2da64d215cd8c32f21",
  "privilegeLevel" : "HIGH",
  "groups" : [ {
    "criteriaItems" : [ {
      "ignoreCase" : true,
      "values" : [ "admin", "superuser" ],
      "targetType" : "group",
      "operator" : "displayName"
    }, {
      "ignoreCase" : true,
      "values" : [ "admin", "superuser" ],
      "targetType" : "group",
      "operator" : "displayName"
    } ],
    "operator" : "AND"
  }, {
    "criteriaItems" : [ {
      "ignoreCase" : true,
      "values" : [ "admin", "superuser" ],
      "targetType" : "group",
      "operator" : "displayName"
    }, {
      "ignoreCase" : true,
      "values" : [ "admin", "superuser" ],
      "targetType" : "group",
      "operator" : "displayName"
    } ],
    "operator" : "AND"
  } ],
  "type" : "CUSTOM",
  "operator" : "AND"
}; // CreatePrivilegeCriteriaRequest | Create custom privilege criteria request body.
        const result = await apiInstance.createCustomPrivilegeCriteriaV1({ createPrivilegeCriteriaRequest: createPrivilegeCriteriaRequest });
        console.log(result);
